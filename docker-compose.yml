version: '3.8'

services:
  db:
    image: postgres:15
    container_name: telenova_db
    restart: always
    environment:
      POSTGRES_USER: telenova_user
      POSTGRES_PASSWORD: telenova_password
      POSTGRES_DB: telenova_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
